<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="This is a Custom Dropdown Project.">
    <title>Custom Dropdown</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=check_circle" />
</head>
<body>

    <div class="container">

        <div class="dropdown" id="dropdown">

            <div class="dropdown-btn" id="dropdownBtn">
                <span id="dropdownLabel">Select an Item</span>
                <span id="arrow">v</span>
            </div>

            <div class="dropdown-list" id="dropdownList">

                <div class="dropdown-item">
                    <span class="item-text">First Item</span>
                    <span class="check material-symbols-rounded">check_circle</span>
                
                </div>
                <div class="dropdown-item">
                    <span class="item-text">Second Item</span>
                    <span class="check material-symbols-rounded">check_circle</span>
                </div>
                <div class="dropdown-item">
                    <span class="item-text">Third Item</span>
                    <span class="check material-symbols-rounded">check_circle</span>
                </div>
                <div class="dropdown-item">
                    <span class="item-text">Fourth Item</span>
                    <span class="check material-symbols-rounded">check_circle</span>
                </div>
                <div class="dropdown-item">
                    <span class="item-text">Fifth Item</span>
                    <span class="check material-symbols-rounded">check_circle</span>
                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
